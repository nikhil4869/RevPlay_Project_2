<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevPlay - Reset Password</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="login-container">
    <h1>RevPlay</h1>
    <div class="tagline">Reset Your Beat 🎵</div>

    <p th:if="${error}" th:text="${error}" class="error"></p>
    <p th:if="${success}" th:text="${success}" style="color: lightgreen;"></p>

    <form th:action="@{/forgot-password}" method="post">

        <input type="email" name="email" placeholder="Email" required>

        <input type="date" name="dateOfBirth" required>

        <div style="position: relative;">
            <input type="password" id="newPassword" name="newPassword" placeholder="New Password" required>
            <span onclick="togglePassword('newPassword')" 
                  style="position: absolute; right: 10px; top: 12px; cursor: pointer; color: gold;">
                👁
            </span>
        </div>

        <button type="submit">Reset Password</button>
    </form>

    <div class="links">
        <p><a th:href="@{/login}">Back to Login</a></p>
    </div>
</div>

<script>
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        field.type = field.type === "password" ? "text" : "password";
    }
</script>

</body>
</html>
