<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

    <div th:fragment="globalPlayer">

        <!-- Audio Element -->
        <audio id="global-audio-element" style="display: none;"></audio>

        <div class="global-player" id="global-player-container" style="display: none;">

            <div class="player-left">
                <img id="player-album-art" src="" alt="Album Art" class="player-cover">
                <div class="player-info">
                    <div class="player-title" id="player-title">Song Title</div>
                    <div class="player-artist" id="player-artist">Artist Name</div>
                </div>
                <button class="favorite-btn" id="player-favorite-btn" title="Add to Favorites">
                    <i class="fa-regular fa-heart"></i>
                </button>
            </div>

            <div class="player-center">
                <div class="player-controls">
                    <button class="control-btn" id="player-shuffle-btn" title="Shuffle"><i
                            class="fa-solid fa-shuffle"></i></button>
                    <button class="control-btn" id="player-prev-btn" title="Previous"><i
                            class="fa-solid fa-backward-step"></i></button>
                    <button class="play-pause-btn" id="player-play-pause-btn" title="Play/Pause">
                        <i class="fa-solid fa-circle-play" id="player-play-icon"></i>
                        <i class="fa-solid fa-circle-pause" id="player-pause-icon" style="display: none;"></i>
                    </button>
                    <button class="control-btn" id="player-next-btn" title="Next"><i
                            class="fa-solid fa-forward-step"></i></button>
                    <button class="control-btn" id="player-repeat-btn" title="Repeat"><i
                            class="fa-solid fa-repeat"></i></button>
                </div>

                <div class="player-progress-container">
                    <span class="time-text" id="player-current-time">0:00</span>
                    <input type="range" class="progress-bar" id="player-progress-bar" value="0" min="0" max="100">
                    <span class="time-text" id="player-total-time">0:00</span>
                </div>
            </div>

            <div class="player-right">
                <i class="fa-solid fa-volume-high volume-icon"></i>
                <input type="range" class="volume-slider" id="player-volume-slider" value="100" min="0" max="100">
            </div>

        </div>

        <!-- Playlist Selection Modal -->
        <div id="playlist-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Select Playlist</h2>
                    <button class="close-modal" onclick="closePlaylistModal()">&times;</button>
                </div>
                <div id="playlist-selection-list" class="modal-body">
                    <!-- Playlists will be dynamically loaded here -->
                    <p>Loading playlists...</p>
                </div>
            </div>
        </div>

        <script th:src="@{/js/player.js}"></script>
        <script th:src="@{/js/navigation.js}"></script>

    </div>

</body>

</html>
