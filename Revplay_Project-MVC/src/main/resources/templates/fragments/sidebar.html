<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

    <div th:fragment="artistSidebar(activePage)">

        <style>
            .sidebar {
                width: 240px;
                background: #0d0d0d;
                padding: 25px 18px;
                min-height: 100vh;
                box-shadow: 4px 0 20px rgba(255, 215, 0, 0.05);
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                position: sticky;
                top: 0;
                z-index: 500;
                /* Below player */
            }

            .logo {
                font-size: 22px;
                font-weight: bold;
                color: gold;
                margin-bottom: 35px;
            }

            .nav-section {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .nav-link {
                text-decoration: none;
                padding: 12px 15px;
                border-radius: 10px;
                font-size: 15px;
                transition: 0.3s;
                display: block;
            }

            .nav-link.inactive {
                color: #ccc;
                background: #161616;
            }

            .nav-link.inactive:hover {
                background: #222;
                color: white;
            }

            .nav-link.active {
                background: linear-gradient(to right, gold, #ffcc00);
                color: black;
                font-weight: 600;
            }

            .logout-btn {
                margin-top: 30px;
                padding: 12px;
                border-radius: 12px;
                border: none;
                background: linear-gradient(to right, #ff4d4d, #ff1a1a);
                color: white;
                font-weight: 600;
                cursor: pointer;
                transition: 0.3s;
            }

            .logout-btn:hover {
                transform: scale(1.05);
            }

            .mobile-toggle {
                display: none;
            }

            @media (max-width: 768px) {
                .sidebar {
                    position: fixed;
                    left: -280px;
                    top: 0;
                    bottom: 0;
                    width: 280px;
                    z-index: 1000;
                    transition: left 0.3s ease;
                    box-shadow: none;
                    background: #0d0d0d;
                    padding: 25px 18px;
                    flex-direction: column;
                    min-height: 100vh;
                    height: 100vh;
                    display: flex !important;
                    /* Ensure it's flex when active */
                }

                .sidebar.active {
                    left: 0;
                    box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
                }

                .nav-section {
                    flex-direction: column;
                    gap: 12px;
                    overflow-x: visible;
                }

                .mobile-toggle {
                    display: flex;
                    position: fixed;
                    top: 15px;
                    right: 15px;
                    width: 45px;
                    height: 45px;
                    background: gold;
                    color: black;
                    border: none;
                    border-radius: 50%;
                    align-items: center;
                    justify-content: center;
                    font-size: 20px;
                    cursor: pointer;
                    z-index: 900;
                    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
                }

                .sidebar-overlay {
                    display: none;
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: rgba(0, 0, 0, 0.7);
                    z-index: 999;
                }

                .sidebar-overlay.active {
                    display: block;
                }

                .menu-close {
                    display: block !important;
                }
            }
        </style>

        <div class="sidebar">

            <div>
                <div class="logo">RevPlay 🎵</div>

                <div class="nav-section">

                    <a th:href="@{/artist/main}"
                        th:class="${activePage == 'dashboard'} ? 'nav-link active' : 'nav-link inactive'">
                        Dashboard
                    </a>

                    <a th:href="@{/artist/albums}"
                        th:class="${activePage == 'albums'} ? 'nav-link active' : 'nav-link inactive'">
                        Albums
                    </a>

                    <a th:href="@{/artist/songs}"
                        th:class="${activePage == 'songs'} ? 'nav-link active' : 'nav-link inactive'">
                        My Songs
                    </a>

                    <a th:href="@{/artist/profile}"
                        th:class="${activePage == 'profile'} ? 'nav-link active' : 'nav-link inactive'">
                        Profile
                    </a>

                    <a th:href="@{/artist/analytics}"
                        th:class="${activePage == 'analytics'} ? 'nav-link active' : 'nav-link inactive'">
                        Analytics
                    </a>

                </div>
            </div>

            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">
                    Logout
                </button>
            </form>

            <!-- Close Button for Mobile -->
            <button class="menu-close" onclick="toggleArtistMenu()"
                style="display: none; position: absolute; top: 20px; right: 20px; background: none; border: none; color: gold; font-size: 30px; cursor: pointer;">&times;</button>
        </div>

        <!-- Hamburger Toggle Button -->
        <button class="mobile-toggle" onclick="toggleArtistMenu()">
            <i class="fa-solid fa-bars"></i>
        </button>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" onclick="toggleArtistMenu()"></div>

        <script>
            function toggleArtistMenu() {
                const sidebar = document.querySelector('.sidebar');
                const overlay = document.querySelector('.sidebar-overlay');
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            }
        </script>

    </div>

</body>

</html>
