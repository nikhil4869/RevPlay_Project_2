<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Analytics</title>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<style>
		:root {
			--artist-bg: #0d0d0d;
			--card-main: #161616;
			--card-grad-start: #1c1c1c;
			--card-grad-end: #141414;
			--accent-gold: gold;
			--text-muted: #aaa;
		}

		body {
			margin: 0;
			font-family: 'Segoe UI', sans-serif;
			background: var(--artist-bg);
			color: white;
		}

		.layout {
			display: flex;
			min-height: 100vh;
		}

		.content {
			flex: 1;
			padding: 40px;
			overflow-y: auto;
		}

		.analytics-container {
			max-width: 1200px;
			margin: 0 auto;
		}

		h2 {
			color: var(--accent-gold);
			font-size: 32px;
			margin-bottom: 30px;
		}

		.hero-stats {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
			gap: 25px;
			margin-bottom: 40px;
		}

		.stat-card-premium {
			background: linear-gradient(145deg, var(--card-grad-start), var(--card-grad-end));
			padding: 25px;
			border-radius: 4px;
			box-shadow: 0 0 25px rgba(255, 215, 0, 0.05);
			display: flex;
			align-items: center;
			gap: 20px;
			transition: 0.3s;
			border: 1px solid rgba(255, 215, 0, 0.05);
		}

		.stat-card-premium:hover {
			transform: translateY(-5px);
			box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
			border-color: var(--accent-gold);
		}

		.stat-icon-large {
			width: 50px;
			height: 50px;
			background: rgba(255, 215, 0, 0.1);
			border-radius: 4px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 20px;
			color: var(--accent-gold);
		}

		.stat-data .stat-desc {
			font-size: 14px;
			color: var(--text-muted);
			margin-bottom: 5px;
			display: block;
		}

		.stat-data .stat-value {
			font-size: 26px;
			font-weight: bold;
			color: var(--accent-gold);
		}

		.insights-grid {
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			gap: 25px;
			margin-top: 20px;
		}

		.insight-card {
			background: var(--card-main);
			padding: 25px;
			border-radius: 4px;
			border: 1px solid rgba(255, 255, 255, 0.03);
			margin-bottom: 25px;
		}

		.insight-header {
			display: flex;
			align-items: center;
			gap: 12px;
			margin-bottom: 25px;
			border-bottom: 1px solid #222;
			padding-bottom: 15px;
		}

		.insight-header h3 {
			color: var(--accent-gold);
			font-size: 18px;
			margin: 0;
			font-weight: 600;
		}

		.ranking-list {
			list-style: none;
			padding: 0;
			margin: 0;
		}

		.ranking-item {
			padding: 12px 0;
			border-bottom: 1px solid #222;
			color: #fff;
		}

		.ranking-item:last-child {
			border-bottom: none;
		}

		.progress-stat {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 8px;
		}

		.progress-bar-bg {
			background: #222;
			height: 12px;
			border-radius: 4px;
			overflow: hidden;
		}

		.progress-bar-fill {
			height: 12px;
			background: linear-gradient(90deg, gold, #ffcc00);
			border-radius: 4px;
			transition: width 1s ease-in-out;
		}
	</style>
</head>

<body>

	<div class="layout">

		<!-- Sidebar -->
		<div th:replace="fragments/sidebar :: artistSidebar('analytics')"></div>

		<div class="content">
			<div class="analytics-container">

				<h2>📊 Artist Analytics</h2>

				<!-- SUMMARY CARDS -->
				<div class="hero-stats">

					<div class="stat-card-premium">
						<div class="stat-icon-large"><i class="fa-solid fa-play"></i></div>
						<div class="stat-data">
							<span class="stat-desc">Total Plays</span>
							<div class="stat-value" th:text="${analytics.totalPlays}">0</div>
						</div>
					</div>

					<div class="stat-card-premium">
						<div class="stat-icon-large"><i class="fa-solid fa-music"></i></div>
						<div class="stat-data">
							<span class="stat-desc">Total Songs</span>
							<div class="stat-value" th:text="${analytics.totalSongs}">0</div>
						</div>
					</div>

					<div class="stat-card-premium">
						<div class="stat-icon-large"><i class="fa-solid fa-compact-disc"></i></div>
						<div class="stat-data">
							<span class="stat-desc">Total Albums</span>
							<div class="stat-value" th:text="${analytics.totalAlbums}">0</div>
						</div>
					</div>

					<div class="stat-card-premium">
						<div class="stat-icon-large"><i class="fa-solid fa-heart"></i></div>
						<div class="stat-data">
							<span class="stat-desc">Total Favorites</span>
							<div class="stat-value" th:text="${analytics.totalFavorites}">0</div>
						</div>
					</div>

					<div class="stat-card-premium">
						<div class="stat-icon-large"><i class="fa-solid fa-users"></i></div>
						<div class="stat-data">
							<span class="stat-desc">Unique Listeners</span>
							<div class="stat-value" th:text="${listeners.uniqueListeners}">0</div>
						</div>
					</div>

				</div>

				<div class="insights-grid">
					<!-- TOP SONGS SECTION -->
					<div class="insight-card">
						<div class="insight-header">
							<h3>🎵 Top 5 Most Played Songs</h3>
						</div>
						<ul class="ranking-list">
							<li th:each="song : ${analytics.topSongs}" class="ranking-item">
								<span th:text="${song}">Song Name</span>
							</li>
						</ul>
					</div>

					<!-- SONG PLAY DISTRIBUTION -->
					<div class="insight-card">
						<div class="insight-header">
							<h3>📊 Song Play Distribution</h3>
						</div>
						<div th:each="song : ${playChart}" style="margin-bottom:25px;">
							<div class="progress-stat">
								<span style="font-weight:500;" th:text="${song.title}">Song</span>
								<div style="display:flex; gap:15px;">
									<span style="color:var(--text-muted);" th:text="${song.plays} + ' plays'">0
										plays</span>
									<span style="color:gold; font-weight:bold;"
										th:text="${analytics.totalPlays > 0} ? (${song.plays} * 100 / ${analytics.totalPlays}) + '%' : '0%'">
										0%
									</span>
								</div>
							</div>
							<div class="progress-bar-bg">
								<div class="progress-bar-fill"
									th:style="${analytics.totalPlays > 0} ? 'width:' + (${song.plays} * 100 / ${analytics.totalPlays}) + '%;' : 'width:0%;'">
								</div>
							</div>
						</div>
					</div>
				</div>

				<!-- DAILY TREND CHART -->
				<div class="insight-card" style="margin-top:20px;">
					<div class="insight-header">
						<h3>📈 Daily Play Trends</h3>
					</div>
					<canvas id="dailyTrendChart" height="100"></canvas>
				</div>

			</div>
		</div>

	</div>

	<script th:inline="javascript">

		const trendDataObject = /*[[${dailyTrends}]]*/[];

		const trendLabels = trendDataObject.map(t => t.date);
		const trendData = trendDataObject.map(t => t.plays);

		const ctx = document.getElementById('dailyTrendChart').getContext('2d');

		new Chart(ctx, {
			type: 'line',
			data: {
				labels: trendLabels,
				datasets: [{
					label: 'Daily Plays',
					data: trendData,
					borderColor: 'gold',
					backgroundColor: 'rgba(255,215,0,0.1)',
					borderWidth: 2,
					tension: 0.4,
					fill: true,
					pointBackgroundColor: 'gold'
				}]
			},
			options: {
				responsive: true,
				plugins: {
					legend: { labels: { color: 'white' } }
				},
				scales: {
					x: { ticks: { color: 'white' }, grid: { color: '#222' } },
					y: { ticks: { color: 'white' }, grid: { color: '#222' } }
				}
			}
		});

	</script>
</body>

</html>
