<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Songs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
        }

        .layout {
            display: flex;
        }

        .content {
            flex: 1;
            padding: 40px;
            padding-bottom: 150px;
        }

        .song-card {
            width: 220px;
            background: #1c1c1c;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .song-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
        }

        .song-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        /* 3 DOT BUTTON */
        .menu-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 6px;
            z-index: 5;
        }

        .menu-btn:hover {
            background: gold;
            color: black;
        }

        .dropdown {
            display: none;
            position: absolute;
            top: 40px;
            right: 10px;
            background: #222;
            border-radius: 8px;
            padding: 8px;
            min-width: 150px;
            z-index: 50;
            /* Below player */
        }

        .dropdown a,
        .dropdown button {
            display: block;
            width: 100%;
            background: none;
            border: none;
            color: white;
            padding: 8px;
            text-align: left;
            text-decoration: none;
            cursor: pointer;
        }

        .dropdown a:hover {
            background: #333;
        }

        .dropdown button {
            color: #ff4d4d;
        }

        .dropdown button:hover {
            background: #330000;
        }

        /* PLAYER */
        .player-bar {
            position: fixed;
            bottom: 20px;
            /* floating */
            left: 275px;
            /* little gap from sidebar */
            right: 20px;
            /* gap on right side */
            background: #181818;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            gap: 25px;
            border-radius: 20px;
            /* rounded all corners */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            /* floating effect */
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .player-controls button {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .player-controls button:hover {
            color: gold;
            transform: scale(1.2);
        }

        .range-style {
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: gold;
            border-radius: 5px;
            outline: none;
        }

        .range-style::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 240px;
        }

        .now-playing img {
            width: 55px;
            height: 55px;
            border-radius: 8px;
            object-fit: cover;
        }

        .volume-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 1024px) {
            .player-bar {
                left: 20px;
            }
        }

        @media (max-width: 768px) {
            .layout {
                flex-direction: column;
            }

            .content {
                padding: 20px;
                padding-top: 80px;
                padding-bottom: 200px;
            }

            .song-card {
                width: 100%;
                max-width: 280px;
            }

            .player-bar {
                flex-direction: column;
                gap: 15px;
                left: 10px;
                right: 10px;
                bottom: 10px;
                padding: 15px;
            }

            .now-playing {
                min-width: auto;
                width: 100%;
                justify-content: center;
            }

            .volume-section {
                display: none;
                /* Hide volume on mobile */
            }

            .player-bar>input[type="range"] {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .song-card {
                max-width: none;
            }

            .player-controls button {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

    <div class="layout">

        <!-- Sidebar -->
        <div th:replace="fragments/sidebar :: artistSidebar('songs')"></div>

        <div class="content">

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px;">
                <h2 style="margin:0;">My Songs 🎵</h2>
                <a th:href="@{/artist/songs/upload}" style="background:gold; color:black; padding:10px 20px; 
                      text-decoration:none; border-radius:8px; font-weight:bold; transition: 0.2s;"
                    onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                    + Upload New Song
                </a>
            </div>

            <div class="filters-row"
                style="display:flex; flex-wrap:wrap; gap:20px; align-items:center; margin-bottom: 30px; background: #181818; padding: 15px 20px; border-radius: 12px; border: 1px solid #333;">

                <div class="search-box" style="position:relative; flex: 2; min-width: 300px; max-width: 500px;">
                    <i class="fa-solid fa-magnifying-glass"
                        style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#888;"></i>
                    <input type="text" id="songSearch" placeholder="Search by name, genre or album..."
                        style="width:100%; padding:12px 12px 12px 40px; border-radius:10px; border:1px solid #444; background:#0a0a0a; color:white; outline:none; transition: all 0.3s ease;"
                        onfocus="this.style.borderColor='gold'; this.style.boxShadow='0 0 10px rgba(255,215,0,0.2)'"
                        onblur="this.style.borderColor='#444'; this.style.boxShadow='none'">
                </div>

                <div class="filter-group"
                    style="display:flex; gap:12px; align-items:center; flex: 3; justify-content: flex-end; min-width: 400px;">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="font-size: 13px; color: #888; white-space: nowrap;">Genre:</span>
                        <select id="genreFilter"
                            style="padding:10px; border-radius:8px; background:#0a0a0a; color:white; border:1px solid #444; outline:none; cursor:pointer; min-width: 140px;">
                            <option value="">All Genres</option>
                        </select>
                    </div>

                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="font-size: 13px; color: #888; white-space: nowrap;">Album:</span>
                        <select id="albumFilter"
                            style="padding:10px; border-radius:8px; background:#0a0a0a; color:white; border:1px solid #444; outline:none; cursor:pointer; min-width: 160px;">
                            <option value="">All Albums</option>
                        </select>
                    </div>

                    <button id="clearFilters"
                        style="background:#333; border:none; color:white; padding:10px 20px; border-radius:8px; cursor:pointer; font-size:14px; font-weight: 500; transition: 0.2s;"
                        onmouseover="this.style.background='#444'" onmouseout="this.style.background='#333'">
                        Reset
                    </button>
                </div>
            </div>

            <div id="noResults"
                style="display:none; text-align:center; padding: 60px; color:#666; background: #181818; border-radius: 15px; border: 1px dashed #333;">
                <i class="fa-solid fa-face-frown" style="font-size: 56px; margin-bottom: 15px; display: block;"></i>
                <h3 style="color:#aaa;">No matches found</h3>
                <p>Try adjusting your search or filters to find what you're looking for.</p>
            </div>

            <div class="songs-grid" style="display:flex; flex-wrap:wrap; gap:25px; margin-top:10px;">

                <div th:each="song, iterStat : ${songs}" class="song-card"
                    th:data-title="${#strings.toLowerCase(song.title)}"
                    th:data-genre="${#strings.toLowerCase(song.genre)}"
                    th:data-album="${#strings.toLowerCase(song.albumName ?: '')}">

                    <button class="menu-btn" th:onclick="'toggleMenu(' + ${song.id} + '); event.stopPropagation();'">
                        ⋮
                    </button>

                    <div th:id="'menu-' + ${song.id}" class="dropdown">

                        <a th:href="@{'/artist/songs/' + ${song.id} + '/cover'}">
                            🖼 Add Cover
                        </a>

                        <form th:action="@{'/artist/songs/' + ${song.id} + '/delete'}" method="post"
                            onsubmit="return confirm('Delete this song permanently?');">

                            <button type="submit"
                                style="background:none;border:none;color:red;cursor:pointer;width:100%;text-align:left;">
                                🗑 Delete Song
                            </button>

                        </form>

                    </div>

                    <div th:onclick="'playSong(' + ${iterStat.index} + ')'" style="cursor:pointer;">

                        <img th:src="@{'http://localhost:8080' + ${song.coverUrl}}" />

                        <div style="padding:15px;">
                            <h4 th:text="${song.title}" style="margin:0;"></h4>
                            <p th:text="${song.duration}" style="color:gray; margin:5px 0;"></p>
                            <p th:text="${song.genre}" style="color:#aaa; font-size:13px;"></p>
                        </div>

                    </div>

                </div>

            </div>

        </div>
    </div>

    <!-- PLAYER -->
    <div class="player-bar">

        <div class="now-playing">
            <img id="playerCover" src="" />
            <div>
                <div id="currentTitle">No Song</div>
            </div>
        </div>

        <div class="player-controls">
            <button onclick="prevSong()">⏮</button>
            <button id="playBtn" onclick="togglePlay()">▶</button>
            <button onclick="nextSong()">⏭</button>
        </div>

        <input type="range" id="seekBar" class="range-style" value="0" step="1" style="flex:1;">

        <div class="volume-section">
            <span id="volumeIcon">🔊</span>
            <input type="range" id="volumeBar" class="range-style" min="0" max="1" step="0.01" value="1"
                style="width:120px;">
        </div>

    </div>

    <audio id="audioPlayer"></audio>

    <script th:inline="javascript">

        let songs = /*[[${songs}]]*/[];
        let currentIndex = 0;

        const audio = document.getElementById("audioPlayer");
        const seekBar = document.getElementById("seekBar");
        const volumeBar = document.getElementById("volumeBar");
        const title = document.getElementById("currentTitle");
        const cover = document.getElementById("playerCover");
        const playBtn = document.getElementById("playBtn");
        const volumeIcon = document.getElementById("volumeIcon");

        function playSong(index) {
            currentIndex = index;
            audio.src = "http://localhost:8080" + songs[index].audioUrl;
            title.innerText = songs[index].title;
            cover.src = "http://localhost:8080" + songs[index].coverUrl;
            audio.play();
            playBtn.innerHTML = "⏸";
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = "⏸";
            } else {
                audio.pause();
                playBtn.innerHTML = "▶";
            }
        }

        function nextSong() {
            currentIndex++;
            if (currentIndex >= songs.length) currentIndex = 0;
            playSong(currentIndex);
        }

        function prevSong() {
            currentIndex--;
            if (currentIndex < 0) currentIndex = songs.length - 1;
            playSong(currentIndex);
        }

        audio.addEventListener("timeupdate", function () {
            seekBar.max = audio.duration;
            seekBar.value = audio.currentTime;
        });

        seekBar.addEventListener("input", function () {
            audio.currentTime = seekBar.value;
        });

        volumeBar.addEventListener("input", function () {
            audio.volume = volumeBar.value;
            if (audio.volume == 0) volumeIcon.innerHTML = "🔇";
            else if (audio.volume < 0.5) volumeIcon.innerHTML = "🔉";
            else volumeIcon.innerHTML = "🔊";
        });

        audio.addEventListener("ended", function () {
            nextSong();
        });

        /* FIXED DROPDOWN CONTROL */
        function toggleMenu(id) {
            document.querySelectorAll(".dropdown").forEach(m => {
                m.style.display = "none";
            });
            let menu = document.getElementById("menu-" + id);
            menu.style.display = "block";
        }

        document.addEventListener("click", function () {
            document.querySelectorAll(".dropdown").forEach(m => {
                m.style.display = "none";
            });
        });

        document.addEventListener("keydown", function (e) {
            if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
            if (e.code === "Space") {
                e.preventDefault();
                togglePlay();
            }
        });

        /* REFINED SEARCH & FILTER LOGIC */
        const songSearch = document.getElementById("songSearch");
        const genreFilter = document.getElementById("genreFilter");
        const albumFilter = document.getElementById("albumFilter");
        const clearFilters = document.getElementById("clearFilters");
        const songCards = document.querySelectorAll(".song-card");
        const noResults = document.getElementById("noResults");
        const songsGrid = document.querySelector(".songs-grid");

        // Dynamically populate filters
        const genres = new Set();
        const albums = new Set();

        songCards.forEach(card => {
            const rawGenre = card.getAttribute("data-genre");
            const rawAlbum = card.getAttribute("data-album");
            if (rawGenre) genres.add(rawGenre.charAt(0).toUpperCase() + rawGenre.slice(1));
            if (rawAlbum) albums.add(rawAlbum.charAt(0).toUpperCase() + rawAlbum.slice(1));
        });

        genres.forEach(g => {
            const opt = document.createElement("option");
            opt.value = g.toLowerCase();
            opt.textContent = g;
            genreFilter.appendChild(opt);
        });

        albums.forEach(a => {
            if (a.toLowerCase() !== "null" && a !== "") {
                const opt = document.createElement("option");
                opt.value = a.toLowerCase();
                opt.textContent = a;
                albumFilter.appendChild(opt);
            }
        });

        function filterSongs() {
            const query = (songSearch.value || "").toLowerCase().trim();
            const selectedGenre = genreFilter.value.toLowerCase();
            const selectedAlbum = albumFilter.value.toLowerCase();

            let hasVisibleCards = false;

            songCards.forEach(card => {
                const title = (card.getAttribute("data-title") || "").toLowerCase();
                const genre = (card.getAttribute("data-genre") || "").toLowerCase();
                const album = (card.getAttribute("data-album") || "").toLowerCase();

                // Check if card matches search keyword
                const matchesSearch = !query ||
                    title.includes(query) ||
                    genre.includes(query) ||
                    album.includes(query);

                // Check if card matches filters
                const matchesGenre = !selectedGenre || genre === selectedGenre;
                const matchesAlbum = !selectedAlbum || album === selectedAlbum;

                if (matchesSearch && matchesGenre && matchesAlbum) {
                    card.style.display = "block";
                    hasVisibleCards = true;
                } else {
                    card.style.display = "none";
                }
            });

            if (hasVisibleCards) {
                noResults.style.display = "none";
                songsGrid.style.display = "flex";
            } else {
                noResults.style.display = "block";
                songsGrid.style.display = "none";
            }
        }

        songSearch.addEventListener("input", filterSongs);
        genreFilter.addEventListener("change", filterSongs);
        albumFilter.addEventListener("change", filterSongs);

        clearFilters.addEventListener("click", () => {
            songSearch.value = "";
            genreFilter.value = "";
            albumFilter.value = "";
            filterSongs();
        });

    </script>

</body>

</html>
