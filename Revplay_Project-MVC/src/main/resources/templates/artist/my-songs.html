<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Songs</title>

    <style>
        body {
            margin:0;
            background:#0f0f0f;
            color:white;
            font-family:Arial, sans-serif;
        }

        .layout {
            display:flex;
        }

        .content {
            flex:1;
            padding:40px;
            padding-bottom:150px;
        }

        .song-card {
            width:220px;
            background:#1c1c1c;
            border-radius:14px;
            overflow:hidden;
            position:relative;
            transition:transform 0.2s ease, box-shadow 0.2s ease;
        }

        .song-card:hover {
            transform:translateY(-5px);
            box-shadow:0 8px 25px rgba(255,215,0,0.3);
        }

        .song-card img {
            width:100%;
            height:180px;
            object-fit:cover;
        }

        /* 3 DOT BUTTON */
        .menu-btn {
            position:absolute;
            top:10px;
            right:10px;
            background:rgba(0,0,0,0.6);
            border:none;
            color:white;
            font-size:18px;
            cursor:pointer;
            padding:5px 8px;
            border-radius:6px;
            z-index:5;
        }

        .menu-btn:hover {
            background:gold;
            color:black;
        }

		.dropdown {
		    display: none;
		    position: absolute;
		    top: 40px;
		    right: 10px;
		    background: #222;
		    border-radius: 8px;
		    padding: 8px;
		    min-width: 150px;
		    z-index: 50; /* Below player */
		}

        .dropdown a,
        .dropdown button {
            display:block;
            width:100%;
            background:none;
            border:none;
            color:white;
            padding:8px;
            text-align:left;
            text-decoration:none;
            cursor:pointer;
        }

        .dropdown a:hover {
            background:#333;
        }

        .dropdown button {
            color:#ff4d4d;
        }

        .dropdown button:hover {
            background:#330000;
        }

        /* PLAYER */
		.player-bar {
		    position: fixed;
		    bottom: 20px;                 /* floating */
		    left: 275px;                  /* little gap from sidebar */
		    right: 20px;                  /* gap on right side */
		    background: #181818;
		    padding: 18px 25px;
		    display: flex;
		    align-items: center;
		    gap: 25px;
		    border-radius: 20px;          /* rounded all corners */
		    box-shadow: 0 10px 40px rgba(0,0,0,0.6);  /* floating effect */
		    backdrop-filter: blur(10px);
		    z-index: 1000;
		}
        .player-controls button {
            background:none;
            border:none;
            color:white;
            font-size:22px;
            cursor:pointer;
            transition:0.2s;
        }

        .player-controls button:hover {
            color:gold;
            transform:scale(1.2);
        }

        .range-style {
            -webkit-appearance:none;
            height:4px;
            background:gold;
            border-radius:5px;
            outline:none;
        }

        .range-style::-webkit-slider-thumb {
            -webkit-appearance:none;
            width:12px;
            height:12px;
            border-radius:50%;
            background:white;
            cursor:pointer;
        }

        .now-playing {
            display:flex;
            align-items:center;
            gap:15px;
            min-width:240px;
        }

        .now-playing img {
            width:55px;
            height:55px;
            border-radius:8px;
            object-fit:cover;
        }

        .volume-section {
            display:flex;
            align-items:center;
            gap:8px;
        }
    </style>
</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <div th:replace="fragments/sidebar :: artistSidebar('songs')"></div>

    <div class="content">

        <h2>My Songs 🎵</h2>

		<a th:href="@{/artist/songs/upload}"
		   style="background:gold; color:black; padding:10px 18px; 
		          text-decoration:none; border-radius:8px; font-weight:bold;">
		    + Upload New Song
		</a>

        <div style="display:flex; flex-wrap:wrap; gap:25px; margin-top:30px;">

            <div th:each="song, iterStat : ${songs}"
                 class="song-card">

                <button class="menu-btn"
                        th:onclick="'toggleMenu(' + ${song.id} + '); event.stopPropagation();'">
                    ⋮
                </button>

                <div th:id="'menu-' + ${song.id}" class="dropdown">

                    <a th:href="@{'/artist/songs/' + ${song.id} + '/cover'}">
                        🖼 Add Cover
                    </a>

					<form th:action="@{'/artist/songs/' + ${song.id} + '/delete'}"
					      method="post"
					      onsubmit="return confirm('Delete this song permanently?');">

					    <button type="submit"
					            style="background:none;border:none;color:red;cursor:pointer;width:100%;text-align:left;">
					        🗑 Delete Song
					    </button>

					</form>

                </div>

                <div th:onclick="'playSong(' + ${iterStat.index} + ')'"
                     style="cursor:pointer;">

                    <img th:src="@{'http://localhost:8080' + ${song.coverUrl}}"/>

                    <div style="padding:15px;">
                        <h4 th:text="${song.title}" style="margin:0;"></h4>
                        <p th:text="${song.duration}" style="color:gray; margin:5px 0;"></p>
                        <p th:text="${song.genre}" style="color:#aaa; font-size:13px;"></p>
                    </div>

                </div>

            </div>

        </div>

    </div>
</div>

<!-- PLAYER -->
<div class="player-bar">

    <div class="now-playing">
        <img id="playerCover" src="" />
        <div>
            <div id="currentTitle">No Song</div>
        </div>
    </div>

    <div class="player-controls">
        <button onclick="prevSong()">⏮</button>
        <button id="playBtn" onclick="togglePlay()">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>

    <input type="range" id="seekBar" class="range-style" value="0" step="1" style="flex:1;">

    <div class="volume-section">
        <span id="volumeIcon">🔊</span>
        <input type="range" id="volumeBar" class="range-style"
               min="0" max="1" step="0.01" value="1" style="width:120px;">
    </div>

</div>

<audio id="audioPlayer"></audio>

<script th:inline="javascript">

let songs = /*[[${songs}]]*/ [];
let currentIndex = 0;

const audio = document.getElementById("audioPlayer");
const seekBar = document.getElementById("seekBar");
const volumeBar = document.getElementById("volumeBar");
const title = document.getElementById("currentTitle");
const cover = document.getElementById("playerCover");
const playBtn = document.getElementById("playBtn");
const volumeIcon = document.getElementById("volumeIcon");

function playSong(index) {
    currentIndex = index;
    audio.src = "http://localhost:8080" + songs[index].audioUrl;
    title.innerText = songs[index].title;
    cover.src = "http://localhost:8080" + songs[index].coverUrl;
    audio.play();
    playBtn.innerHTML = "⏸";
}

function togglePlay() {
    if (audio.paused) {
        audio.play();
        playBtn.innerHTML = "⏸";
    } else {
        audio.pause();
        playBtn.innerHTML = "▶";
    }
}

function nextSong() {
    currentIndex++;
    if (currentIndex >= songs.length) currentIndex = 0;
    playSong(currentIndex);
}

function prevSong() {
    currentIndex--;
    if (currentIndex < 0) currentIndex = songs.length - 1;
    playSong(currentIndex);
}

audio.addEventListener("timeupdate", function() {
    seekBar.max = audio.duration;
    seekBar.value = audio.currentTime;
});

seekBar.addEventListener("input", function() {
    audio.currentTime = seekBar.value;
});

volumeBar.addEventListener("input", function() {
    audio.volume = volumeBar.value;
    if (audio.volume == 0) volumeIcon.innerHTML = "🔇";
    else if (audio.volume < 0.5) volumeIcon.innerHTML = "🔉";
    else volumeIcon.innerHTML = "🔊";
});

audio.addEventListener("ended", function() {
    nextSong();
});

/* FIXED DROPDOWN CONTROL */
function toggleMenu(id) {
    document.querySelectorAll(".dropdown").forEach(m => {
        m.style.display = "none";
    });
    let menu = document.getElementById("menu-" + id);
    menu.style.display = "block";
}

document.addEventListener("click", function() {
    document.querySelectorAll(".dropdown").forEach(m => {
        m.style.display = "none";
    });
});

document.addEventListener("keydown", function(e) {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if (e.code === "Space") {
        e.preventDefault();
        togglePlay();
    }
});

</script>

</body>
</html>
