<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upload Cover</title>

    <style>
        body {
            background: linear-gradient(to bottom right, #0f0f0f, #1a1a1a);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;

            min-height: 100vh;          /* Fix full screen issue */
            display: flex;              
            align-items: center;        
            justify-content: center;    
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: #181818;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: gold;
        }

        .file-label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            color: #ccc;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 25px;
            border-radius: 8px;
            border: none;
            background: #2a2a2a;
            color: white;
            font-size: 14px;
        }

        input:focus {
            outline: 2px solid gold;
        }

        .upload-btn {
            width: 100%;
            padding: 12px;
            background: gold;
            color: black;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-btn:hover {
            background: #ffcc00;
            transform: scale(1.03);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: gray;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🎨 Upload Album Cover</h2>

    <form th:action="@{'/artist/albums/' + ${albumId} + '/cover'}"
          method="post"
          enctype="multipart/form-data">

        <label class="file-label">Select Cover Image</label>

        <input type="file" name="image" required>

        <button type="submit" class="upload-btn">
            Upload Cover
        </button>

    </form>

    <a th:href="@{/artist/albums}" class="back-link">
        ← Back To Albums
    </a>

</div>

</body>
</html>
