<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>My Albums</title>
</head>

<body style="display:flex; background:#111; color:white; margin:0;">

	<!-- Sidebar -->
	<div th:replace="fragments/sidebar :: artistSidebar('albums')"></div>

	<!-- Content -->
	<div style="flex:1; padding:40px;">

		<div style="display:flex; justify-content:space-between; align-items:center;">
			<h1>My Albums 🎼</h1>

			<a th:href="@{/artist/albums/create}"
				style="background:gold; color:black; padding:10px 15px; text-decoration:none; border-radius:6px;">
				+ Create Album
			</a>
		</div>

		<div th:if="${#lists.isEmpty(albums)}" style="margin-top:40px;">
			<p>No albums yet. Start your music journey!</p>
		</div>

		<div style="display:flex; flex-wrap:wrap; gap:25px; margin-top:30px;">

			<div th:each="album : ${albums}"
				style="width:240px; background:#1c1c1c; border-radius:12px; overflow:hidden; position:relative;">

				<!-- 3 DOT BUTTON -->
				<div style="position:absolute; top:10px; right:10px;">
					<button th:onclick="'toggleMenu(' + ${album.id} + ')'"
						style="background:none;border:none;color:white;font-size:18px;cursor:pointer;">
						⋮
					</button>

					<div th:id="'menu-' + ${album.id}" style="display:none; position:absolute; right:0; background:#222;
		                    border-radius:8px; padding:8px; min-width:140px;">

						<a th:href="@{'/artist/albums/' + ${album.id} + '/edit'}"
							style="display:block; color:white; padding:6px; text-decoration:none;">
							✏ Edit
						</a>

						<a th:href="@{'/artist/albums/' + ${album.id} + '/cover'}"
							style="display:block; color:white; padding:6px; text-decoration:none;">
							🖼 Edit Cover
						</a>

						<form th:action="@{'/artist/albums/' + ${album.id} + '/delete'}" method="post"
							onsubmit="return confirm('Delete this album?');">

							<button type="submit"
								style="background:none;border:none;color:red;padding:6px;cursor:pointer;width:100%;text-align:left;">
								🗑 Delete
							</button>
						</form>

					</div>
				</div>

				<!-- COVER -->
				<a th:href="@{'/artist/albums/' + ${album.id}}">
					<img th:src="${'http://localhost:8080' + album.coverImage}"
						style="width:100%; height:180px; object-fit:cover;">
				</a>

				<!-- DETAILS -->
				<div style="padding:15px;">
					<h3 th:text="${album.name}" style="margin:0;"></h3>
					<p th:text="${album.releaseDate}" style="color:gray; font-size:14px;"></p>
				</div>

			</div>
		</div>

	</div>

	<script>
		function toggleMenu(id) {
			let menu = document.getElementById("menu-" + id);

			// close all menus first
			document.querySelectorAll("[id^='menu-']").forEach(m => {
				if (m !== menu) m.style.display = "none";
			});

			menu.style.display = (menu.style.display === "block") ? "none" : "block";
		}

		document.addEventListener("click", function (event) {
			if (!event.target.closest("button")) {
				document.querySelectorAll("[id^='menu-']").forEach(m => {
					m.style.display = "none";
				});
			}
		});
	</script>
</body>

</html>
