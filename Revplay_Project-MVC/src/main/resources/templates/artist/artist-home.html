<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Artist Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0d0d0d;
            color: white;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .content {
            flex: 1;
            padding: 40px;
        }

        /* ===== Welcome Section ===== */

        .welcome {
            background: linear-gradient(135deg, #1a1a1a, #111);
            padding: 35px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.05);
        }

        .welcome h2 {
            margin: 0;
            color: gold;
            font-size: 26px;
        }

        .welcome p {
            margin: 5px 0 0;
            color: #aaa;
        }

        .actions a {
            text-decoration: none;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-left: 15px;
            transition: 0.3s;
        }

        .btn-gold {
            background: linear-gradient(45deg, gold, #ffcc00);
            color: black;
        }

        .btn-gold:hover {
            transform: scale(1.05);
        }

        /* ===== Stats Section ===== */

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            flex: 1;
            background: #161616;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.1);
        }

        .stat-card h3 {
            margin: 0;
            font-size: 14px;
            color: #aaa;
        }

        .stat-card p {
            margin: 12px 0 0;
            font-size: 28px;
            color: gold;
            font-weight: bold;
        }

        /* ===== Top Song Section ===== */

        .top-song {
            background: #161616;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.05);
        }

        .top-song h3 {
            color: gold;
            margin-bottom: 20px;
        }

        .top-song-name {
            font-size: 22px;
            font-weight: bold;
        }

        .top-song-plays {
            color: #aaa;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="layout">

        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: artistSidebar('main')}"></div>

        <div class="content">

            <!-- Welcome Section -->
            <div class="welcome">
                <div>
                    <h2>
                        Welcome Back,
                        <span th:text="${artistName}">Artist</span>
                        🎵
                    </h2>
                    <p>Your music performance at a glance</p>
                </div>

                <div class="actions">
                    <a th:href="@{/artist/songs/upload}">
                        <button class="btn btn-gold">➕ Add Song</button>
                    </a>

                    <a th:href="@{/artist/albums/create}">
                        <button class="btn btn-gold">💿 Add Album</button>
                    </a>

                    <a th:href="@{/artist/profile/edit}">
                        <button class="btn btn-gold">✏ Edit Profile</button>
                    </a>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats">

                <div class="stat-card">
                    <h3>Total Plays</h3>
                    <p th:text="${analytics.totalPlays}">0</p>
                </div>

                <div class="stat-card">
                    <h3>Total Songs</h3>
                    <p th:text="${analytics.totalSongs}">0</p>
                </div>

                <div class="stat-card">
                    <h3>Total Albums</h3>
                    <p th:text="${analytics.totalAlbums}">0</p>
                </div>

                <div class="stat-card">
                    <h3>Total Favorites</h3>
                    <p th:text="${analytics.totalFavorites}">0</p>
                </div>

                <div class="stat-card">
                    <h3>Unique Listeners</h3>
                    <p th:text="${listeners.uniqueListeners}">0</p>
                </div>

            </div>

            <!-- Top Song -->
            <div class="top-song">

                <h3>🏆 Top Performing Song</h3>

                <div th:if="${analytics.topSongs != null and !analytics.topSongs.isEmpty()}">

                    <div class="top-song-name" th:text="${analytics.topSongs.get(0)}">
                        Song Name
                    </div>

                    <div class="top-song-plays" th:text="${analytics.totalPlays} + ' total plays across songs'">
                        0 plays
                    </div>

                </div>

                <div th:if="${analytics.topSongs == null or analytics.topSongs.isEmpty()}">
                    No songs available yet.
                </div>

            </div>

        </div>
    </div>

</body>

</html>
