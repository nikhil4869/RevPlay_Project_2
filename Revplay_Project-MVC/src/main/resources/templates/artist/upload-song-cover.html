<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upload Song Cover</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(to bottom right, #0f0f0f, #1a1a1a);
            font-family: 'Segoe UI', sans-serif;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 500px;
            background: #181818;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: gold;
        }

        .file-label {
            margin-bottom: 8px;
            display: block;
            font-size: 14px;
            color: #ccc;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 25px;
            border-radius: 8px;
            border: none;
            background: #2a2a2a;
            color: white;
            font-size: 14px;
        }

        input:focus {
            outline: 2px solid gold;
        }

        .upload-btn {
            width: 100%;
            padding: 12px;
            background: gold;
            color: black;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-btn:hover {
            background: #ffcc00;
            transform: scale(1.03);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: gray;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🎵 Upload Song Cover</h2>

    <form th:action="@{'/artist/songs/' + ${songId} + '/cover'}"
          method="post"
          enctype="multipart/form-data">

        <label class="file-label">Select Cover Image</label>
        <input type="file"
               name="image"
               accept="image/*"
               required>

        <button type="submit" class="upload-btn">
            Upload Cover
        </button>

    </form>

    <a th:href="@{/artist/songs}" class="back-link">
        ← Back To My Songs
    </a>

</div>

</body>
</html>
